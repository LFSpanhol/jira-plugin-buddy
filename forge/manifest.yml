modules:
  jira:projectPage:
    - key: qaflow-hub
      resource: main
      resolver:
        function: resolver
      render: native
      title: QAFlow
      icon: https://developer.atlassian.com/console/avatars/240x240-atlas.png
      route: qaflow

  jira:issuePanel:
    - key: qaflow-issue-panel
      resource: issuePanel
      resolver:
        function: resolver
      render: native
      title: QAFlow – Casos de Teste
      icon: https://developer.atlassian.com/console/avatars/240x240-atlas.png

  jira:globalPage:
    - key: qaflow-shared-steps
      resource: sharedSteps
      resolver:
        function: resolver
      render: native
      title: QAFlow – Steps Compartilhados
      icon: https://developer.atlassian.com/console/avatars/240x240-atlas.png

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: src/frontend/QAHub.jsx
  - key: issuePanel
    path: src/frontend/IssuePanel.jsx
  - key: sharedSteps
    path: src/frontend/SharedStepsLibrary.jsx

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/REPLACE-APOS-forge-register

permissions:
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
    - read:jira-user
  external:
    fetch:
      backend: []
